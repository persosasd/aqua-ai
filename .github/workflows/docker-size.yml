name: Docker Image Size

on:
  pull_request:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - 'backend/**'
      - 'frontend/**'
      - 'ai-models/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  check-size:
    name: Check Docker Image Sizes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Backend Image
        run: |
          docker build -t aqua-ai-backend:pr ./backend
          echo "BACKEND_SIZE=$(docker image inspect aqua-ai-backend:pr --format='{{.Size}}')" >> $GITHUB_ENV

      - name: Build Frontend Image
        run: |
          docker build -t aqua-ai-frontend:pr ./frontend
          echo "FRONTEND_SIZE=$(docker image inspect aqua-ai-frontend:pr --format='{{.Size}}')" >> $GITHUB_ENV

      - name: Build AI Models Image
        run: |
          docker build -t aqua-ai-ai-models:pr ./ -f ./ai-models/Dockerfile
          echo "AI_SIZE=$(docker image inspect aqua-ai-ai-models:pr --format='{{.Size}}')" >> $GITHUB_ENV

      - name: Comment PR with image sizes
        uses: actions/github-script@v9
        with:
          script: |
            const toMB = (bytes) => (parseInt(bytes) / 1024 / 1024).toFixed(1);
            const warn = (mb) => parseFloat(mb) > 500 ? '⚠️' : '✅';
            const backend = toMB(process.env.BACKEND_SIZE);
            const frontend = toMB(process.env.FRONTEND_SIZE);
            const ai = toMB(process.env.AI_SIZE);
            const body = `## 🐳 Docker Image Sizes\n\n| Image | Size | Status |\n|-------|------|--------|\n| Backend | ${backend} MB | ${warn(backend)} |\n| Frontend | ${frontend} MB | ${warn(frontend)} |\n| AI Models | ${ai} MB | ${warn(ai)} |\n\n> ⚠️ = over 500 MB — consider optimizing`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
