name: Lighthouse CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          CI: false

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./frontend/.lighthouserc.json
          runs: 3

      - name: Format Lighthouse Score
        id: format
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf-8'));
            const latest = results[results.length - 1];
            const summary = JSON.parse(fs.readFileSync(latest.jsonPath, 'utf-8'));
            const scores = {
              performance: Math.round(summary.categories.performance.score * 100),
              accessibility: Math.round(summary.categories.accessibility.score * 100),
              bestPractices: Math.round(summary.categories['best-practices'].score * 100),
              seo: Math.round(summary.categories.seo.score * 100),
            };
            const emoji = (s) => s >= 90 ? '🟢' : s >= 50 ? '🟡' : '🔴';
            const body = `## ⚡ Lighthouse Report\n\n| Category | Score |\n|----------|-------|\n| ${emoji(scores.performance)} Performance | ${scores.performance} |\n| ${emoji(scores.accessibility)} Accessibility | ${scores.accessibility} |\n| ${emoji(scores.bestPractices)} Best Practices | ${scores.bestPractices} |\n| ${emoji(scores.seo)} SEO | ${scores.seo} |`;
            core.setOutput('body', body);

      - name: Comment PR with Lighthouse scores
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: lighthouse
          message: ${{ steps.format.outputs.body }}
