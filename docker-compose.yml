services:
  # PostgreSQL Database with PostGIS
  database:
    image: postgis/postgis:14-3.2@sha256:c94740607edaf0f0fb3f5aaecb6dabd638b859abb5a651b26ee89b5eb58d2cb7
    container_name: aqua-ai-db
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - aqua-ai-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aqua-ai-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:?DB_USER is required}:${DB_PASSWORD:?DB_PASSWORD is required}@database:5432/${DB_NAME:?DB_NAME is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - PORT=${PORT:-5000}
    command: ['sh', '-c', 'npm run migrate && npm start']
    depends_on:
      database:
        condition: service_healthy
    networks:
      - aqua-ai-network
    restart: unless-stopped

  # Frontend React Application (Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: aqua-ai-frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - aqua-ai-network
    restart: unless-stopped

  # Python Data Pipeline and AI Models
  ai-pipeline:
    build:
      context: .
      dockerfile: ai-models/Dockerfile
    container_name: aqua-ai-pipeline
    environment:
      - DATABASE_URL=postgresql://${DB_USER:?DB_USER is required}:${DB_PASSWORD:?DB_PASSWORD is required}@database:5432/${DB_NAME:?DB_NAME is required}
      - DATA_GOV_IN_API_KEY=${DATA_GOV_IN_API_KEY}
      - DATA_GOV_IN_RESOURCE_ID=${DATA_GOV_IN_RESOURCE_ID:-f83158c9-ff64-4ef5-ae8c-c76baf56dae3}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - ALLOW_SAMPLE_DATA=${ALLOW_SAMPLE_DATA:-false}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./ai-models:/app/ai-models
      - ./data-pipeline:/app/data-pipeline
      - ai_models_data:/app/models
    networks:
      - aqua-ai-network
    command: ['python', '/app/data-pipeline/fetch_data.py']
    restart: on-failure

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: aqua-ai-redis
    ports:
      - '6379:6379'
    networks:
      - aqua-ai-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  ai_models_data:

networks:
  aqua-ai-network:
    driver: bridge
